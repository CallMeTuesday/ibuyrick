<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Rick Owens @ 2nd Street NYC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c8b99a;
      --red: #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      min-height: 100dvh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 0 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 16px;
    }

    #count-badge { margin-right: auto; }

    .bell-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .bell-btn.subscribed { color: var(--accent); }
    .bell-btn:active { opacity: 0.6; }

    .scope-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .scope-toggle-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .scope-toggle.on .scope-toggle-label { color: var(--accent); }

    .toggle-track {
      width: 30px;
      height: 17px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      position: relative;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .scope-toggle.on .toggle-track { border-color: var(--accent); }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 11px;
      height: 11px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .scope-toggle.on .toggle-thumb {
      transform: translateX(13px);
      background: var(--accent);
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #count-badge {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* --- desktop button rows --- */
    .filter-rows {
      display: none;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 16px;
    }

    .filter-row + .filter-row { margin-top: 6px; }
    .filter-row::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 12px;
      height: 34px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn:active { opacity: 0.7; }

    .filter-sep {
      display: inline-flex;
      align-items: center;
      height: 34px;
      color: #444;
      font-size: 15px;
      padding: 0 8px;
      flex-shrink: 0;
      user-select: none;
    }

    .location-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 12px;
      height: 34px;
      border-radius: 3px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      min-width: 200px;
      flex-shrink: 0;
    }

    /* --- mobile selects --- */
    .mobile-filters {
      display: flex;
      gap: 8px;
      padding: 0 16px;
    }

    .mobile-filters select {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 8px;
      height: 34px;
      border-radius: 3px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    @media (min-width: 769px) {
      .filter-rows { display: block; }
      .mobile-filters { display: none; }
    }

    main {
      padding: 16px;
    }

    #status {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 360px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 769px) {
      #grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
      main { padding: 20px 24px; }
    }

    @media (min-width: 1100px) {
      #grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (min-width: 1400px) {
      #grid { grid-template-columns: repeat(5, 1fr); }
    }

    @media (min-width: 1800px) {
      #grid { grid-template-columns: repeat(6, 1fr); gap: 16px; }
      main { padding: 24px 32px; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      border-color: var(--accent);
      opacity: 0.85;
    }

    @media (hover: hover) {
      .card:hover {
        border-color: var(--accent);
      }
    }

    .card-img-wrap {
      aspect-ratio: 3/4;
      background: #1a1a1a;
      overflow: hidden;
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .card-img-wrap img.loading {
      opacity: 0;
    }

    .card-body {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-vendor {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .card-title {
      font-size: 11px;
      color: var(--text);
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .card-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .card-store {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      max-width: 55%;
      line-height: 1.3;
    }

    .sold-out-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.75);
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 6px;
      border-radius: 2px;
    }

    #error-msg {
      text-align: center;
      padding: 40px 16px;
      color: var(--red);
      font-size: 13px;
    }

    #refresh-btn {
      display: block;
      margin: 16px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 3px;
      cursor: pointer;
    }

    #refresh-btn:active { opacity: 0.6; }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Rick Owens</h1>
      <span id="count-badge">2nd Street NYC</span>
      <button class="bell-btn" id="bell-btn" title="Subscribe to new item alerts" style="display:none" aria-label="Subscribe to notifications">
        <svg id="bell-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="scope-toggle" id="scope-toggle" title="Show all store locations">
        <span class="scope-toggle-label">All Stores</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
    </div>
    <div class="filter-rows">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="RICK OWENS DRKSHDW">DRKSHDW</button>
        <button class="filter-btn" data-filter="RICK OWENS LILIES">Lilies</button>
<span class="filter-sep">|</span>
        <button class="filter-btn active" data-sort="newest">Newest</button>
        <button class="filter-btn" data-sort="price-asc">Price ↑</button>
        <button class="filter-btn" data-sort="price-desc">Price ↓</button>
        <span class="filter-sep">|</span>
        <button class="filter-btn" data-type="shoes">Shoes</button>
        <button class="filter-btn" data-type="tops">Tops</button>
        <button class="filter-btn" data-type="bottoms">Bottoms</button>
        <button class="filter-btn" data-type="accessories">Accessories</button>
      </div>
      <div class="filter-row" id="location-row" style="margin-top:6px">
        <button class="filter-btn active" data-location="all">All NYC</button>
      </div>
    </div>
    <div class="mobile-filters">
      <select id="m-filter-select">
        <option value="all">All</option>
        <option value="RICK OWENS DRKSHDW">DRKSHDW</option>
        <option value="RICK OWENS LILIES">Lilies</option>
      </select>
      <select id="m-sort-select">
        <option value="newest">Newest</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
      <select id="m-type-select">
        <option value="all">Type</option>
        <option value="shoes">Shoes</option>
        <option value="tops">Tops</option>
        <option value="bottoms">Bottoms</option>
        <option value="accessories">Accessories</option>
      </select>
      <select id="m-location-select">
        <option value="all">All NYC</option>
      </select>
    </div>
  </header>

  <main>
    <div id="status">
      <div class="spinner"></div>
      Loading items...
    </div>
    <div id="error-msg" style="display:none"></div>
    <div id="grid"></div>
  </main>

  <script>
    const BASE = 'https://ec.2ndstreetusa.com';
    const STORE_PREFIX = '2nd street ';
    const NYC_LOCATIONS = [
      { value: 'chelsea',          label: 'Chelsea' },
      { value: 'dumbo',            label: 'Dumbo' },
      { value: 'lower east side',  label: 'Lower East Side' },
      { value: 'noho',             label: 'NoHo' },
      { value: 'soho',             label: 'SoHo' },
      { value: 'upper east side',  label: 'Upper East Side' },
      { value: 'upper west side',  label: 'Upper West Side' },
      { value: 'williamsburg',     label: 'Williamsburg' },
    ];
    const NYC_LOCATION_VALUES = new Set(NYC_LOCATIONS.map(l => l.value));

    let allProducts = [];
    let activeFilter = 'all';
    let activeSort = 'newest';
    let activeType = 'all';
    let activeLocation = 'all';
    let nycOnly = true;

    // Fetch all pages
    async function fetchAll() {
      const products = [];
      let page = 1;
      const limit = 250;

      while (true) {
        const url = `${BASE}/collections/rick-raf/products.json?limit=${limit}&page=${page}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const batch = data.products || [];
        if (!batch.length) break;

        // Filter: vendor contains "rick owens" (case-insensitive)
        const ro = batch.filter(p =>
          p.vendor && p.vendor.toLowerCase().includes('rick owens')
        );

        products.push(...ro);

        if (batch.length < limit) break;
        page++;

        setStatus(`Loading... ${products.length} items found`);
      }

      return products;
    }

    function getSimpleType(product) {
      const seg = (product.product_type || '').split(' - ');
      const cat = (seg[1] || '').toLowerCase();
      if (cat.includes('shoes') || cat.includes('boots')) return 'shoes';
      if (cat.includes('bottom') || cat.includes('skirt') || cat.includes('dress')) return 'bottoms';
      if (cat.includes('bags') || cat.includes('eyewear') || cat.includes('headwear') || cat.includes('fashion goods')) return 'accessories';
      if ((seg[0] || '').toLowerCase() === 'clothing') return 'tops';
      return null;
    }

    function extractStore(product) {
      const tag = (product.tags || []).find(t =>
        t.toLowerCase().startsWith(STORE_PREFIX)
      );
      return tag ? tag.slice(STORE_PREFIX.length).trim().toLowerCase() : '';
    }

    function getPrice(product) {
      const variants = product.variants || [];
      if (!variants.length) return null;
      const prices = variants.map(v => parseFloat(v.price)).filter(p => !isNaN(p));
      return prices.length ? Math.min(...prices) : null;
    }

    function isAvailable(product) {
      return (product.variants || []).some(v => v.available);
    }

    function formatPrice(n) {
      return n % 1 === 0 ? `$${n}` : `$${n.toFixed(2)}`;
    }

    function applyFilters(products) {
      let list = [...products];

      if (activeFilter !== 'all') {
        list = list.filter(p =>
          p.vendor && p.vendor.toUpperCase() === activeFilter
        );
      }

      if (activeType !== 'all') {
        list = list.filter(p => getSimpleType(p) === activeType);
      }

      if (activeLocation !== 'all') {
        list = list.filter(p => extractStore(p) === activeLocation);
      } else if (nycOnly) {
        list = list.filter(p => NYC_LOCATION_VALUES.has(extractStore(p)));
      }

      if (activeSort === 'newest') {
        list.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
      } else if (activeSort === 'price-asc') {
        list.sort((a, b) => (getPrice(a) || 0) - (getPrice(b) || 0));
      } else if (activeSort === 'price-desc') {
        list.sort((a, b) => (getPrice(b) || 0) - (getPrice(a) || 0));
      }

      return list;
    }

    function renderGrid(products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (!products.length) {
        grid.innerHTML = '<div class="empty-state">No items found</div>';
        return;
      }

      const frag = document.createDocumentFragment();

      products.forEach(product => {
        const price = getPrice(product);
        const available = isAvailable(product);
        const img = product.images?.[0]?.src || '';
        const store = extractStore(product);
        const url = `${BASE}/products/${product.handle}`;

        const card = document.createElement('a');
        card.href = url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'card';

        card.innerHTML = `
          <div class="card-img-wrap">
            ${img ? `<img src="${img}&width=400" alt="${esc(product.title)}" loading="lazy" class="loading" onload="this.classList.remove('loading')" onerror="this.style.display='none'">` : ''}
            ${!available ? '<span class="sold-out-badge">Sold Out</span>' : ''}
          </div>
          <div class="card-body">
            <div class="card-vendor">${esc(product.vendor)}</div>
            <div class="card-title">${esc(product.title)}</div>
          </div>
          <div class="card-footer">
            <span class="card-price">${price !== null ? formatPrice(price) : '—'}</span>
            ${store ? `<span class="card-store">${esc(store)}</span>` : ''}
          </div>
        `;

        frag.appendChild(card);
      });

      grid.appendChild(frag);
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setStatus(msg) {
      document.getElementById('status').innerHTML =
        `<div class="spinner"></div>${msg}`;
    }

    function updateCount(filtered, total) {
      const badge = document.getElementById('count-badge');
      badge.textContent = filtered === total
        ? `${total} item${total !== 1 ? 's' : ''}`
        : `${filtered} of ${total} items`;
    }

    function refresh() {
      const grid = document.getElementById('grid');
      const errEl = document.getElementById('error-msg');
      const status = document.getElementById('status');

      grid.innerHTML = '';
      errEl.style.display = 'none';
      status.style.display = 'block';
      setStatus('Loading items...');

      fetchAll()
        .then(products => {
          allProducts = products;
          status.style.display = 'none';
          // Rebuild location UI now that we have data (needed for all-stores mode)
          buildLocationButtons();
          const filtered = applyFilters(allProducts);
          renderGrid(filtered);
          updateCount(filtered.length, scopeTotal());
        })
        .catch(err => {
          status.style.display = 'none';
          errEl.style.display = 'block';
          errEl.innerHTML = `Failed to load: ${esc(err.message)}<br><button id="refresh-btn" onclick="refresh()">Retry</button>`;
        });
    }

    function buildLocationButtons() {
      const allLabel = nycOnly ? 'All NYC' : 'All Locations';
      const locations = nycOnly
        ? NYC_LOCATIONS
        : [...new Set(allProducts.map(p => extractStore(p)).filter(Boolean))].sort()
            .map(v => ({ value: v, label: v.replace(/\b\w/g, c => c.toUpperCase()) }));

      // Desktop
      const row = document.getElementById('location-row');
      row.innerHTML = '';

      if (nycOnly) {
        // Button row for NYC (small, known set)
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn' + (activeLocation === 'all' ? ' active' : '');
        allBtn.dataset.location = 'all';
        allBtn.textContent = allLabel;
        row.appendChild(allBtn);

        locations.forEach(({ value, label }) => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (activeLocation === value ? ' active' : '');
          btn.dataset.location = value;
          btn.textContent = label;
          row.appendChild(btn);
        });

        row.querySelectorAll('[data-location]').forEach(btn => {
          btn.addEventListener('click', () => {
            row.querySelectorAll('[data-location]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeLocation = btn.dataset.location;
            updateURL();
            rerender();
          });
        });
      } else {
        // Styled select for all stores (large, dynamic set)
        const sel = document.createElement('select');
        sel.className = 'location-select';
        sel.innerHTML = `<option value="all">${allLabel}</option>`;
        locations.forEach(({ value, label }) => {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = label;
          sel.appendChild(opt);
        });
        sel.value = activeLocation;
        sel.addEventListener('change', e => {
          activeLocation = e.target.value;
          updateURL();
          rerender();
        });
        row.appendChild(sel);
      }

      // Mobile select (always a select)
      const mSel = document.getElementById('m-location-select');
      mSel.innerHTML = `<option value="all">${allLabel}</option>`;
      locations.forEach(({ value, label }) => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label;
        mSel.appendChild(opt);
      });
      mSel.value = activeLocation;
    }

    // --- URL state ---
    function readStateFromURL() {
      const p = new URLSearchParams(location.search);
      activeFilter   = p.get('filter')   || 'all';
      activeSort     = p.get('sort')     || 'newest';
      activeType     = p.get('type')     || 'all';
      activeLocation = p.get('location') || 'all';
      nycOnly        = p.get('scope')    !== 'all';
    }

    function updateURL() {
      const p = new URLSearchParams();
      if (activeFilter   !== 'all')    p.set('filter',   activeFilter);
      if (activeSort     !== 'newest') p.set('sort',     activeSort);
      if (activeType     !== 'all')    p.set('type',     activeType);
      if (activeLocation !== 'all')    p.set('location', activeLocation);
      if (!nycOnly)                    p.set('scope',    'all');
      const qs = p.toString();
      history.replaceState(null, '', qs ? '?' + qs : location.pathname);
    }

    function syncFilterUI() {
      document.querySelectorAll('[data-filter]').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.filter === activeFilter)
      );
      document.querySelectorAll('[data-sort]').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.sort === activeSort)
      );
      document.querySelectorAll('[data-type]').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.type === activeType)
      );
      document.getElementById('m-filter-select').value = activeFilter;
      document.getElementById('m-sort-select').value = activeSort;
      document.getElementById('m-type-select').value = activeType;
      document.getElementById('scope-toggle').classList.toggle('on', !nycOnly);
    }

    function scopeTotal() {
      return nycOnly
        ? allProducts.filter(p => NYC_LOCATION_VALUES.has(extractStore(p))).length
        : allProducts.length;
    }

    function rerender() {
      const filtered = applyFilters(allProducts);
      renderGrid(filtered);
      updateCount(filtered.length, scopeTotal());
    }

    // Desktop filter buttons
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        updateURL();
        rerender();
      });
    });

    // Desktop sort buttons
    document.querySelectorAll('[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSort = btn.dataset.sort;
        updateURL();
        rerender();
      });
    });

    // Desktop type buttons
    document.querySelectorAll('[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        const next = btn.dataset.type === activeType ? 'all' : btn.dataset.type;
        document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
        if (next !== 'all') btn.classList.add('active');
        activeType = next;
        document.getElementById('m-type-select').value = activeType;
        updateURL();
        rerender();
      });
    });

    // Mobile selects
    document.getElementById('m-filter-select').addEventListener('change', e => {
      activeFilter = e.target.value;
      updateURL();
      rerender();
    });
    document.getElementById('m-sort-select').addEventListener('change', e => {
      activeSort = e.target.value;
      updateURL();
      rerender();
    });
    document.getElementById('m-type-select').addEventListener('change', e => {
      activeType = e.target.value;
      updateURL();
      rerender();
    });
    document.getElementById('m-location-select').addEventListener('change', e => {
      activeLocation = e.target.value;
      updateURL();
      rerender();
    });

    // Scope toggle (NYC only ↔ all stores)
    document.getElementById('scope-toggle').addEventListener('click', () => {
      nycOnly = !nycOnly;
      activeLocation = 'all';
      document.getElementById('scope-toggle').classList.toggle('on', !nycOnly);
      updateURL();
      buildLocationButtons();
      rerender();
    });

    // Restore state from URL, then sync UI before first render
    readStateFromURL();
    syncFilterUI();
    buildLocationButtons();

    // Initial load
    refresh();

  </script>
  <script>
    // --- Push notification subscription ---
    // Set NOTIFIER_URL after deploying the notifier service to Railway
    const NOTIFIER_URL = 'https://ibuyrick-production.up.railway.app';

    function urlBase64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    const bellBtn = document.getElementById('bell-btn');
    const bellIcon = document.getElementById('bell-icon');

    const BELL_OUTLINE = `<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>`;
    const BELL_FILLED = `<path fill="currentColor" stroke="none" d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>`;

    async function getVapidKey() {
      const res = await fetch(`${NOTIFIER_URL}/vapid-public-key`);
      const { key } = await res.json();
      return key;
    }

    async function getCurrentSubscription() {
      if (!('serviceWorker' in navigator)) return null;
      const reg = await navigator.serviceWorker.ready;
      return reg.pushManager.getSubscription();
    }

    async function initBell() {
      if (!NOTIFIER_URL || !('serviceWorker' in navigator) || !('PushManager' in window)) return;
      bellBtn.style.display = 'flex';
      const sub = await getCurrentSubscription();
      setBellState(!!sub);
    }

    function setBellState(subscribed) {
      bellIcon.innerHTML = subscribed ? BELL_FILLED : BELL_OUTLINE;
      bellBtn.classList.toggle('subscribed', subscribed);
      bellBtn.title = subscribed ? 'Unsubscribe from alerts' : 'Subscribe to new item alerts';
    }

    bellBtn.addEventListener('click', async () => {
      bellBtn.disabled = true;
      try {
        const existing = await getCurrentSubscription();

        if (existing) {
          await fetch(`${NOTIFIER_URL}/unsubscribe`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ endpoint: existing.endpoint }),
          });
          await existing.unsubscribe();
          setBellState(false);
        } else {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') return;

          const [reg, vapidKey] = await Promise.all([
            navigator.serviceWorker.register('./sw.js'),
            getVapidKey(),
          ]);

          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(vapidKey),
          });

          await fetch(`${NOTIFIER_URL}/subscribe`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sub),
          });

          setBellState(true);
        }
      } catch (err) {
        console.error('Bell error:', err);
      } finally {
        bellBtn.disabled = false;
      }
    });

    initBell();
  </script>
