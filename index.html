<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Rick Owens @ 2nd Street NYC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c8b99a;
      --red: #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      min-height: 100dvh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #count-badge {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row .filter-btn { flex-shrink: 0; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn:active {
      opacity: 0.7;
    }

    #sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    main {
      padding: 16px;
    }

    #status {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 360px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 769px) {
      #grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
      main { padding: 20px 24px; }
    }

    @media (min-width: 1100px) {
      #grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (min-width: 1400px) {
      #grid { grid-template-columns: repeat(5, 1fr); }
    }

    @media (min-width: 1800px) {
      #grid { grid-template-columns: repeat(6, 1fr); gap: 16px; }
      main { padding: 24px 32px; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      border-color: var(--accent);
      opacity: 0.85;
    }

    @media (hover: hover) {
      .card:hover {
        border-color: var(--accent);
      }
    }

    .card-img-wrap {
      aspect-ratio: 3/4;
      background: #1a1a1a;
      overflow: hidden;
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .card-img-wrap img.loading {
      opacity: 0;
    }

    .card-body {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-vendor {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .card-title {
      font-size: 11px;
      color: var(--text);
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .card-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .card-store {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      max-width: 55%;
      line-height: 1.3;
    }

    .sold-out-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.75);
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 6px;
      border-radius: 2px;
    }

    #error-msg {
      text-align: center;
      padding: 40px 16px;
      color: var(--red);
      font-size: 13px;
    }

    #refresh-btn {
      display: block;
      margin: 16px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 3px;
      cursor: pointer;
    }

    #refresh-btn:active { opacity: 0.6; }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Rick Owens</h1>
      <span id="count-badge">2nd Street NYC</span>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="RICK OWENS DRKSHDW">DRKSHDW</button>
      <button class="filter-btn" data-filter="RICK OWENS LILIES">Lilies</button>
      <button class="filter-btn" data-filter="available">In Stock</button>
      <select id="sort-select">
        <option value="newest">Newest</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
    </div>
    <div class="filter-row" id="location-row" style="margin-top:8px">
      <button class="filter-btn active" data-location="all">All Locations</button>
    </div>
  </header>

  <main>
    <div id="status">
      <div class="spinner"></div>
      Loading items...
    </div>
    <div id="error-msg" style="display:none"></div>
    <div id="grid"></div>
  </main>

  <script>
    const BASE = 'https://ec.2ndstreetusa.com';
    const NYC_STORES = [
      'Chelsea','Dumbo','Lower East Side','NoHo','SoHo',
      'Upper East Side','Upper West Side','Williamsburg'
    ];

    let allProducts = [];
    let activeFilter = 'all';
    let activeSort = 'newest';
    let activeLocation = 'all';

    // Fetch all pages
    async function fetchAll() {
      const products = [];
      let page = 1;
      const limit = 250;

      while (true) {
        const url = `${BASE}/collections/rick-raf/products.json?limit=${limit}&page=${page}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const batch = data.products || [];
        if (!batch.length) break;

        // Filter: vendor contains "rick owens" (case-insensitive)
        const ro = batch.filter(p =>
          p.vendor && p.vendor.toLowerCase().includes('rick owens')
        );

        // Filter: at least one NYC store tag
        const nyc = ro.filter(p => {
          const tags = (p.tags || []).map(t => t.toLowerCase());
          return NYC_STORES.some(store =>
            tags.some(t => t.includes(store.toLowerCase()))
          );
        });

        // Fall back to all RO items if none match NYC tags
        products.push(...(nyc.length ? nyc : ro));

        if (batch.length < limit) break;
        page++;

        setStatus(`Loading... ${products.length} items found`);
      }

      return products;
    }

    function extractStore(product) {
      const tags = product.tags || [];
      const match = tags.find(t =>
        NYC_STORES.some(s => t.toLowerCase().includes(s.toLowerCase()))
      );
      if (!match) return '';
      // Clean up tag to just the store name
      for (const store of NYC_STORES) {
        if (match.toLowerCase().includes(store.toLowerCase())) return store;
      }
      return match;
    }

    function getPrice(product) {
      const variants = product.variants || [];
      if (!variants.length) return null;
      const prices = variants.map(v => parseFloat(v.price)).filter(p => !isNaN(p));
      return prices.length ? Math.min(...prices) : null;
    }

    function isAvailable(product) {
      return (product.variants || []).some(v => v.available);
    }

    function formatPrice(n) {
      return n % 1 === 0 ? `$${n}` : `$${n.toFixed(2)}`;
    }

    function applyFilters(products) {
      let list = [...products];

      if (activeFilter === 'available') {
        list = list.filter(p => isAvailable(p));
      } else if (activeFilter !== 'all') {
        list = list.filter(p =>
          p.vendor && p.vendor.toUpperCase() === activeFilter
        );
      }

      if (activeLocation !== 'all') {
        list = list.filter(p => extractStore(p) === activeLocation);
      }

      if (activeSort === 'newest') {
        list.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
      } else if (activeSort === 'price-asc') {
        list.sort((a, b) => (getPrice(a) || 0) - (getPrice(b) || 0));
      } else if (activeSort === 'price-desc') {
        list.sort((a, b) => (getPrice(b) || 0) - (getPrice(a) || 0));
      }

      return list;
    }

    function renderGrid(products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (!products.length) {
        grid.innerHTML = '<div class="empty-state">No items found</div>';
        return;
      }

      const frag = document.createDocumentFragment();

      products.forEach(product => {
        const price = getPrice(product);
        const available = isAvailable(product);
        const img = product.images?.[0]?.src || '';
        const store = extractStore(product);
        const url = `${BASE}/products/${product.handle}`;

        const card = document.createElement('a');
        card.href = url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'card';

        card.innerHTML = `
          <div class="card-img-wrap">
            ${img ? `<img src="${img}&width=400" alt="${esc(product.title)}" loading="lazy" class="loading" onload="this.classList.remove('loading')" onerror="this.style.display='none'">` : ''}
            ${!available ? '<span class="sold-out-badge">Sold Out</span>' : ''}
          </div>
          <div class="card-body">
            <div class="card-vendor">${esc(product.vendor)}</div>
            <div class="card-title">${esc(product.title)}</div>
          </div>
          <div class="card-footer">
            <span class="card-price">${price !== null ? formatPrice(price) : '—'}</span>
            ${store ? `<span class="card-store">${esc(store)}</span>` : ''}
          </div>
        `;

        frag.appendChild(card);
      });

      grid.appendChild(frag);
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setStatus(msg) {
      document.getElementById('status').innerHTML =
        `<div class="spinner"></div>${msg}`;
    }

    function updateCount(filtered, total) {
      const badge = document.getElementById('count-badge');
      badge.textContent = filtered === total
        ? `${total} item${total !== 1 ? 's' : ''}`
        : `${filtered} of ${total} items`;
    }

    function refresh() {
      const grid = document.getElementById('grid');
      const errEl = document.getElementById('error-msg');
      const status = document.getElementById('status');

      grid.innerHTML = '';
      errEl.style.display = 'none';
      status.style.display = 'block';
      setStatus('Loading items...');

      fetchAll()
        .then(products => {
          allProducts = products;
          status.style.display = 'none';
          buildLocationButtons(allProducts);
          const filtered = applyFilters(allProducts);
          renderGrid(filtered);
          updateCount(filtered.length, allProducts.length);
        })
        .catch(err => {
          status.style.display = 'none';
          errEl.style.display = 'block';
          errEl.innerHTML = `Failed to load: ${esc(err.message)}<br><button id="refresh-btn" onclick="refresh()">Retry</button>`;
        });
    }

    function buildLocationButtons(products) {
      const stores = [...new Set(products.map(p => extractStore(p)).filter(Boolean))].sort();
      const row = document.getElementById('location-row');
      // Remove all except "All Locations"
      row.querySelectorAll('[data-location]:not([data-location="all"])').forEach(b => b.remove());
      stores.forEach(store => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.location = store;
        btn.textContent = store;
        row.appendChild(btn);
      });
      row.querySelectorAll('[data-location]').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('[data-location]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeLocation = btn.dataset.location;
          const filtered = applyFilters(allProducts);
          renderGrid(filtered);
          updateCount(filtered.length, allProducts.length);
        });
      });
    }

    // Filter buttons
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        const filtered = applyFilters(allProducts);
        renderGrid(filtered);
        updateCount(filtered.length, allProducts.length);
      });
    });

    // Sort select
    document.getElementById('sort-select').addEventListener('change', e => {
      activeSort = e.target.value;
      const filtered = applyFilters(allProducts);
      renderGrid(filtered);
      updateCount(filtered.length, allProducts.length);
    });

    // Initial load
    refresh();
  </script>
</body>
</html>
